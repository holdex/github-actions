name: Setup Runtime
description: Setup Bun, pnpm, or npm runtime for checks

inputs:
  package-manager:
    description: Package manager to use (bun, pnpm, or npm)
    required: false
    default: "bun"

runs:
  using: composite
  steps:
    - name: Validate package manager
      shell: bash
      run: |
        if [ "${{ inputs.package-manager }}" != "bun" ] && [ "${{ inputs.package-manager }}" != "pnpm" ] && [ "${{ inputs.package-manager }}" != "npm" ]; then
          echo "::error::Invalid package-manager '${{ inputs.package-manager }}'. Supported values: bun, pnpm, npm."
          exit 1
        fi

    - name: Setup Bun
      if: inputs.package-manager == 'bun'
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: latest

    - name: Setup Node.js
      if: inputs.package-manager == 'pnpm' || inputs.package-manager == 'npm'
      uses: actions/setup-node@v4
      with:
        node-version: 22

    - name: Setup pnpm
      if: inputs.package-manager == 'pnpm'
      uses: pnpm/action-setup@v4
