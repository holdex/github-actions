name: PR Checks
description: Run selected PR checks in a single job

inputs:
  run-prettier:
    description: Run Prettier check
    required: false
    default: "true"
  run-markdown:
    description: Run Markdown check
    required: false
    default: "true"
  run-commits:
    description: Run Commit check
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - name: Setup Bun
      if: (github.event_name != 'pull_request' || github.event.pull_request.draft != true) && (inputs.run-prettier != 'false' || inputs.run-markdown != 'false' || inputs.run-commits != 'false')
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: latest

    - name: Get changed files
      id: changed-files
      if: (github.event_name != 'pull_request' || github.event.pull_request.draft != true) && (inputs.run-prettier != 'false' || inputs.run-markdown != 'false')
      uses: tj-actions/changed-files@22103cc46bda19c2b464ffe86db46df6922fd323

    - name: Run Prettier check
      if: (github.event_name != 'pull_request' || github.event.pull_request.draft != true) && inputs.run-prettier != 'false'
      uses: ./.github/actions/prettier
      with:
        changed-files: ${{ steps.changed-files.outputs.all_changed_files }}
        setup-bun: "false"

    - name: Run Markdown check
      if: (github.event_name != 'pull_request' || github.event.pull_request.draft != true) && inputs.run-markdown != 'false'
      uses: ./.github/actions/markdown-check
      with:
        changed-files: ${{ steps.changed-files.outputs.all_changed_files }}
        setup-bun: "false"

    - name: Run Commit check
      if: (github.event_name != 'pull_request' || github.event.pull_request.draft != true) && inputs.run-commits != 'false'
      uses: ./.github/actions/commit-check
      with:
        setup-bun: "false"
