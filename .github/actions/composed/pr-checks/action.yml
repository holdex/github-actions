name: PR Checks
description: Run selected PR checks in a single job

inputs:
  run-prettier:
    description: Run Prettier check
    required: false
    default: "true"
  run-markdown:
    description: Run Markdown check
    required: false
    default: "true"
  run-commits:
    description: Run Commit check
    required: false
    default: "true"
  package-manager:
    description: Package manager to use (bun, pnpm, or npm)
    required: false
    default: "bun"
  working-directory:
    description: Working directory to run checks in
    required: false
    default: "."

runs:
  using: composite
  steps:
    - name: Set working directory
      shell: bash
      run: |
        dir="${HOLDEX_WORKING_DIR:-${{ inputs.working-directory }}}"
        dir="${dir#./}"
        if [ ! -d "$dir" ]; then
          echo "Error: working-directory '$dir' does not exist." >&2
          exit 1
        fi
        echo "HOLDEX_WORKING_DIR=$dir" >> "$GITHUB_ENV"

    - name: Get changed files
      id: changed-files
      if:
        (github.event_name != 'pull_request' || github.event.pull_request.draft
        != true) && (inputs.run-prettier != 'false' || inputs.run-markdown !=
        'false')
      uses: tj-actions/changed-files@22103cc46bda19c2b464ffe86db46df6922fd323
      with:
        files: "${{ env.HOLDEX_WORKING_DIR || '.' }}/**"

    - name: Strip working directory prefix from changed files
      id: relative-files
      if:
        (github.event_name != 'pull_request' || github.event.pull_request.draft
        != true) && (inputs.run-prettier != 'false' || inputs.run-markdown !=
        'false')
      shell: bash
      run: |
        files="${{ steps.changed-files.outputs.all_changed_files }}"
        dir="${HOLDEX_WORKING_DIR:-.}"
        if [ "$dir" != "." ]; then
          relative=""
          for f in $files; do
            relative="$relative ${f#"$dir/"}"
          done
          files="${relative# }"
        fi
        echo "files=$files" >> "$GITHUB_OUTPUT"

    - name: Run Prettier check
      if:
        (github.event_name != 'pull_request' || github.event.pull_request.draft
        != true) && inputs.run-prettier != 'false'
      uses: ./.holdex-actions/.github/actions/base/prettier
      with:
        changed-files: ${{ steps.relative-files.outputs.files }}
        package-manager: ${{ inputs.package-manager }}

    - name: Run Markdown check
      if:
        (github.event_name != 'pull_request' || github.event.pull_request.draft
        != true) && inputs.run-markdown != 'false'
      uses: ./.holdex-actions/.github/actions/base/markdown-check
      with:
        changed-files: ${{ steps.relative-files.outputs.files }}
        package-manager: ${{ inputs.package-manager }}

    - name: Run Commit check
      if:
        (github.event_name != 'pull_request' || github.event.pull_request.draft
        != true) && inputs.run-commits != 'false'
      uses: ./.holdex-actions/.github/actions/base/commit-check
      with:
        package-manager: ${{ inputs.package-manager }}
