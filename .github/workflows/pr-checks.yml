name: PR Checks

on:
  workflow_call:
    inputs:
      run-prettier:
        description: "Run Prettier check"
        required: false
        type: boolean
        default: true
      run-markdown:
        description: "Run Markdown check"
        required: false
        type: boolean
        default: true
      run-commits:
        description: "Run Commit check"
        required: false
        type: boolean
        default: true

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run selected PR checks
        uses: ./.github/actions/pr-checks
        with:
          run-prettier: ${{ inputs.run-prettier }}
          run-markdown: ${{ inputs.run-markdown }}
          run-commits: ${{ inputs.run-commits }}
