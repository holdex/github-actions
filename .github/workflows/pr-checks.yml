name: PR Checks

on:
  workflow_call:
    inputs:
      run-prettier:
        description: "Run Prettier check"
        required: false
        type: boolean
        default: true
      run-markdown:
        description: "Run Markdown check"
        required: false
        type: boolean
        default: true
      run-commits:
        description: "Run Commit check"
        required: false
        type: boolean
        default: true
      package-manager:
        description: "Package manager to use (bun or pnpm)"
        required: false
        type: string
        default: bun

jobs:
  checks:
    if: github.event.pull_request == null || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout shared actions repository
        uses: actions/checkout@v4
        with:
          repository: holdex/github-actions
          ref: ${{ github.workflow_sha }}
          path: .github-actions-source

      - name: Validate package manager
        shell: bash
        run: |
          if [ "${{ inputs.package-manager }}" != "bun" ] && [ "${{ inputs.package-manager }}" != "pnpm" ]; then
            echo "::error::Invalid package-manager '${{ inputs.package-manager }}'. Supported values: bun, pnpm."
            exit 1
          fi

      - name: Setup Bun
        if: inputs.package-manager == 'bun'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js
        if: inputs.package-manager == 'pnpm'
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        if: inputs.package-manager == 'pnpm'
        uses: pnpm/action-setup@v4

      - name: Get changed files
        id: changed-files
        if: inputs.run-prettier != false || inputs.run-markdown != false
        uses: tj-actions/changed-files@22103cc46bda19c2b464ffe86db46df6922fd323

      - name: Run Prettier check
        if: inputs.run-prettier != false
        uses: ./.github-actions-source/.github/actions/prettier
        with:
          changed-files: ${{ steps.changed-files.outputs.all_changed_files }}
          setup-runtime: "false"
          package-manager: ${{ inputs.package-manager }}

      - name: Run Markdown check
        if: inputs.run-markdown != false
        uses: ./.github-actions-source/.github/actions/markdown-check
        with:
          changed-files: ${{ steps.changed-files.outputs.all_changed_files }}
          setup-runtime: "false"
          package-manager: ${{ inputs.package-manager }}

      - name: Run Commit check
        if: inputs.run-commits != false
        uses: ./.github-actions-source/.github/actions/commit-check
        with:
          setup-runtime: "false"
          package-manager: ${{ inputs.package-manager }}
