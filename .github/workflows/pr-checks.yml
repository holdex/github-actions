name: PR Checks

on:
  workflow_call:
    inputs:
      run-prettier:
        description: "Run Prettier check"
        required: false
        type: boolean
        default: true
      run-markdown:
        description: "Run Markdown check"
        required: false
        type: boolean
        default: true
      run-commits:
        description: "Run Commit check"
        required: false
        type: boolean
        default: true
      package-manager:
        description: "Package manager to use (bun, pnpm, or npm)"
        required: false
        type: string
        default: bun
      ref:
        description: "Ref to checkout from holdex/github-actions"
        required: false
        type: string
        default: main

jobs:
  checks:
    if: github.event.pull_request == null || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: holdex/github-actions/.github/actions/base/checkout@main
        with:
          ref: ${{ inputs.ref }}

      - name: Setup runtime
        uses: ./.holdex-actions/.github/actions/base/setup-runtime
        with:
          package-manager: ${{ inputs.package-manager }}

      - name: Run selected PR checks
        uses: ./.holdex-actions/.github/actions/composed/pr-checks
        with:
          run-prettier: ${{ inputs.run-prettier }}
          run-markdown: ${{ inputs.run-markdown }}
          run-commits: ${{ inputs.run-commits }}
          package-manager: ${{ inputs.package-manager }}
