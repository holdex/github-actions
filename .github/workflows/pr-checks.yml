name: PR Checks

on:
  workflow_call:
    inputs:
      run-prettier:
        description: "Run Prettier check"
        required: false
        type: boolean
        default: true
      run-markdown:
        description: "Run Markdown check"
        required: false
        type: boolean
        default: true
      run-commits:
        description: "Run Commit check"
        required: false
        type: boolean
        default: true
      package-manager:
        description: "Package manager to use (bun, pnpm, or npm)"
        required: false
        type: string
        default: bun

jobs:
  checks:
    if: github.event.pull_request == null || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: log workflow sha
        run: 'echo "Workflow SHA: ${{ github.workflow_sha }}"'

      - uses: holdex/github-actions/.github/actions/base/checkout@5d652c128c2e34b2d3966d13f295e5fa4ed29d0b
        with:
          ref: ${{ github.workflow_sha }}

      - name: Setup runtime
        uses: ./.holdex-actions/.github/actions/base/setup-runtime
        with:
          package-manager: ${{ inputs.package-manager }}

      - name: Run selected PR checks
        uses: ./.holdex-actions/.github/actions/composed/pr-checks
        with:
          run-prettier: ${{ inputs.run-prettier }}
          run-markdown: ${{ inputs.run-markdown }}
          run-commits: ${{ inputs.run-commits }}
          package-manager: ${{ inputs.package-manager }}
